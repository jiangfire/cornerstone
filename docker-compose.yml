# Cornerstone production-ready compose stack.
#
# 该文件假设用于"对外可访问"的部署。所有敏感配置走 ${VAR:?...}：
# 如果对应变量未设置，docker compose 会直接报错而不是用弱口令默认值起来。
#
# 本地开发请叠加 docker-compose.dev.yml：
#     docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# 创建/管理 .env 时参考根目录 .env.example。真实凭据请勿提交到仓库。

services:
  postgres:
    image: postgres:15-alpine
    container_name: cornerstone-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cornerstone}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required (set a strong random value in .env)}
      POSTGRES_DB: ${POSTGRES_DB:-cornerstone}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    # 默认不向宿主暴露 5432；如需本地访问，使用 docker-compose.dev.yml 覆盖。
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cornerstone}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cornerstone-network

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cornerstone-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-cornerstone}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-cornerstone}?sslmode=disable
      DB_MAX_OPEN: ${DB_MAX_OPEN:-10}
      DB_MAX_IDLE: ${DB_MAX_IDLE:-5}
      DB_MAX_LIFETIME: ${DB_MAX_LIFETIME:-3600}

      SERVER_MODE: ${SERVER_MODE:-release}
      PORT: 8080

      LOG_LEVEL: ${LOG_LEVEL:-info}
      # 日志统一输出 JSON 到 stdout, 轮转/采集交给 docker / 编排层 (compose `logging` 块或 k8s sidecar)。

      # 留空表示同源；跨域部署请显式列出允许的 origin（逗号分隔）。
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      DEBUG: "false"

      # Master Token（必填，请在 .env 中设置）
      MASTER_TOKEN: ${MASTER_TOKEN:?MASTER_TOKEN is required (set a secure value in .env)}

      # 可选：LLM / AI 助手
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o}
      LLM_BASE_URL: ${LLM_BASE_URL:-}

      # 可选：MCP
      MCP_ALLOWED_ORIGINS: ${MCP_ALLOWED_ORIGINS:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/ready"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - cornerstone-network

volumes:
  postgres_data:
    driver: local

networks:
  cornerstone-network:
    driver: bridge
