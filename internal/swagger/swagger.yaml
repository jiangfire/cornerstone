  /health:
    get:
      description: Liveness probe. Returns 200 if the process is running.
      produces:
      - application/json
      responses:
        "200":
          description: '{"status":"healthy","service":"cornerstone-backend","version":"...","time":"..."}'
          schema:
            type: object
      summary: Health check
      tags:
      - health
  /mcp:
    get:
      description: Opens a Server-Sent Events stream for receiving MCP notifications.
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE stream
          schema:
            type: string
        "401":
          description: Unauthorized - invalid or missing API key
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "406":
          description: 'Not Acceptable - requires Accept: text/event-stream'
          schema:
            type: object
      security:
      - ApiKeyAuth: []
      summary: Open MCP SSE stream
      tags:
      - mcp
    post:
      consumes:
      - application/json
      description: Streamable HTTP MCP protocol endpoint.
      parameters:
      - description: JSON-RPC request
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "400":
          description: Parse error - invalid JSON-RPC
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized - invalid or missing API key
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Handle MCP request (SSE)
      tags:
      - mcp
  /ready:
    get:
      description: Readiness probe. Returns 200 if the process is running and the
        database is reachable.
      produces:
      - application/json
      responses:
        "200":
          description: '{"status":"ready","service":"cornerstone-backend","version":"...","time":"..."}'
          schema:
            type: object
        "503":
          description: '{"status":"unready","reason":"..."}'
          schema:
            type: object
      summary: Readiness check
      tags:
      - health
securityDefinitions:
  ApiKeyAuth:
    in: header
    name: Authorization
