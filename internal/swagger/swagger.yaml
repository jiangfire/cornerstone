definitions:
  dto.AIChatData:
    properties:
      context:
        additionalProperties: {}
        type: object
      reply:
        example: 'You have 3 databases: ...'
        type: string
      type:
        example: result
        type: string
    type: object
  dto.AIChatRequest:
    properties:
      context:
        additionalProperties: {}
        type: object
      message:
        example: Show me all databases
        type: string
    required:
    - message
    type: object
  dto.APIResponse:
    properties:
      code:
        example: 0
        type: integer
      data: {}
      message:
        example: success
        type: string
    type: object
  dto.BatchQueryRequest:
    properties:
      queries:
        additionalProperties:
          $ref: '#/definitions/dto.QueryDSLRequest'
        type: object
    type: object
  dto.BulkCreateData:
    properties:
      database:
        $ref: '#/definitions/dto.DatabaseObject'
      fields:
        items:
          $ref: '#/definitions/dto.FieldObject'
        type: array
      summary:
        properties:
          field_count:
            example: 5
            type: integer
          table_count:
            example: 2
            type: integer
        type: object
      tables:
        items:
          $ref: '#/definitions/dto.TableObject'
        type: array
    type: object
  dto.BulkCreateTable:
    properties:
      description:
        example: User accounts
        type: string
      fields:
        items:
          $ref: '#/definitions/dto.BulkCreateTableField'
        type: array
      name:
        example: users
        type: string
    required:
    - name
    type: object
  dto.BulkCreateTableField:
    properties:
      description:
        example: The record title
        type: string
      name:
        example: title
        type: string
      required:
        example: false
        type: boolean
      type:
        example: string
        type: string
    required:
    - name
    - type
    type: object
  dto.DatabaseBulkCreateRequest:
    properties:
      description:
        example: App database
        type: string
      name:
        example: My App
        maxLength: 255
        minLength: 2
        type: string
      tables:
        items:
          $ref: '#/definitions/dto.BulkCreateTable'
        type: array
    required:
    - name
    type: object
  dto.DatabaseCreateRequest:
    properties:
      description:
        example: A test database
        maxLength: 500
        type: string
      name:
        example: My Database
        maxLength: 255
        minLength: 2
        type: string
    required:
    - name
    type: object
  dto.DatabaseListData:
    properties:
      databases:
        items:
          $ref: '#/definitions/dto.DatabaseObject'
        type: array
      total:
        example: 3
        type: integer
    type: object
  dto.DatabaseObject:
    properties:
      description:
        example: A test database
        type: string
      id:
        example: db_abc123
        type: string
      name:
        example: My Database
        type: string
    type: object
  dto.DatabaseUpdateRequest:
    properties:
      description:
        example: Updated description
        maxLength: 500
        type: string
      name:
        example: Updated DB
        maxLength: 255
        minLength: 2
        type: string
    required:
    - name
    type: object
  dto.ErrorResponse:
    properties:
      code:
        example: 400
        type: integer
      message:
        example: Validation error - invalid request body
        type: string
    type: object
  dto.FieldConfig:
    properties:
      allowed_types:
        example:
        - image/*
        - .pdf
        items:
          type: string
        type: array
      format:
        example: "2006-01-02"
        type: string
      max:
        example: 100
        type: number
      max_file_size_mb:
        example: 10
        type: integer
      max_length:
        example: 255
        type: integer
      min:
        example: 0
        type: number
      multiple:
        example: false
        type: boolean
      options:
        example:
        - option1
        - option2
        items:
          type: string
        type: array
      required:
        example: false
        type: boolean
      validation:
        example: ^[a-z]+$
        type: string
    type: object
  dto.FieldCreateRequest:
    properties:
      config:
        $ref: '#/definitions/dto.FieldConfig'
      description:
        example: Current status
        maxLength: 1000
        type: string
      name:
        example: status
        maxLength: 255
        minLength: 1
        type: string
      options:
        example: active,inactive
        type: string
      required:
        example: true
        type: boolean
      table_id:
        example: tbl_xyz789
        type: string
      type:
        example: string
        type: string
    required:
    - name
    - table_id
    - type
    type: object
  dto.FieldListData:
    properties:
      items:
        items:
          $ref: '#/definitions/dto.FieldObject'
        type: array
      total:
        example: 8
        type: integer
    type: object
  dto.FieldObject:
    properties:
      config:
        $ref: '#/definitions/dto.FieldConfig'
      deprecated:
        example: false
        type: boolean
      description:
        example: Current status
        type: string
      id:
        example: fld_def456
        type: string
      name:
        example: status
        type: string
      options:
        example: active,inactive
        type: string
      required:
        example: true
        type: boolean
      table_id:
        example: tbl_xyz789
        type: string
      type:
        example: string
        type: string
    type: object
  dto.FieldUpdateRequest:
    properties:
      config:
        $ref: '#/definitions/dto.FieldConfig'
      description:
        example: Current status
        maxLength: 1000
        type: string
      name:
        example: status
        maxLength: 255
        minLength: 1
        type: string
      options:
        example: active,inactive
        type: string
      required:
        example: true
        type: boolean
      type:
        example: string
        type: string
    required:
    - name
    - type
    type: object
  dto.FileListData:
    properties:
      items:
        items:
          $ref: '#/definitions/dto.FileObject'
        type: array
    type: object
  dto.FileObject:
    properties:
      field_id:
        example: fld_def456
        type: string
      file_name:
        example: report.pdf
        type: string
      file_size:
        example: 204800
        type: integer
      file_type:
        example: application/pdf
        type: string
      id:
        example: fil_mno678
        type: string
      record_id:
        example: rec_ghi012
        type: string
      storage_url:
        example: ./uploads/file_report.pdf
        type: string
    type: object
  dto.QueryDSLRequest:
    type: object
  dto.QueryResult:
    properties:
      data:
        items:
          additionalProperties: true
          type: object
        type: array
      has_more:
        example: true
        type: boolean
      page:
        example: 1
        type: integer
      size:
        example: 20
        type: integer
      total:
        example: 100
        type: integer
    type: object
  dto.RecordBatchCreateRequest:
    properties:
      data:
        additionalProperties: true
        type: object
      table_id:
        example: tbl_xyz789
        type: string
    required:
    - data
    - table_id
    type: object
  dto.RecordCreateRequest:
    properties:
      data:
        additionalProperties: true
        type: object
      table_id:
        example: tbl_xyz789
        type: string
    required:
    - data
    - table_id
    type: object
  dto.RecordListData:
    properties:
      has_more:
        example: true
        type: boolean
      records:
        items:
          $ref: '#/definitions/dto.RecordObject'
        type: array
      total:
        example: 42
        type: integer
    type: object
  dto.RecordObject:
    properties:
      data: {}
      id:
        example: rec_ghi012
        type: string
      table_id:
        example: tbl_xyz789
        type: string
      version:
        example: 1
        type: integer
    type: object
  dto.RecordUpdateRequest:
    properties:
      data:
        additionalProperties: true
        type: object
      version:
        example: 3
        type: integer
    required:
    - data
    type: object
  dto.TableCreateRequest:
    properties:
      database_id:
        example: db_abc123
        type: string
      description:
        example: Order records
        maxLength: 500
        type: string
      name:
        example: orders
        maxLength: 255
        minLength: 2
        type: string
    required:
    - database_id
    - name
    type: object
  dto.TableListData:
    properties:
      tables:
        items:
          $ref: '#/definitions/dto.TableObject'
        type: array
      total:
        example: 5
        type: integer
    type: object
  dto.TableObject:
    properties:
      database_id:
        example: db_abc123
        type: string
      description:
        example: Order records
        type: string
      id:
        example: tbl_xyz789
        type: string
      name:
        example: orders
        type: string
    type: object
  dto.TableUpdateRequest:
    properties:
      description:
        example: Updated orders
        maxLength: 500
        type: string
      name:
        example: orders_v2
        maxLength: 255
        minLength: 2
        type: string
    required:
    - name
    type: object
  dto.TokenCreateData:
    properties:
      expires_at:
        example: "2027-01-01T00:00:00Z"
        type: string
      id:
        example: tok_jkl345
        type: string
      name:
        example: my-app-token
        type: string
      scopes:
        example: read,write
        type: string
      token:
        example: cs_a1b2c3d4e5f6...
        type: string
    type: object
  dto.TokenCreateRequest:
    properties:
      expires_at:
        example: "2027-01-01T00:00:00Z"
        type: string
      name:
        example: my-app-token
        maxLength: 255
        minLength: 1
        type: string
      scopes:
        example: read,write
        type: string
    required:
    - name
    type: object
  dto.TokenListData:
    properties:
      tokens:
        items:
          $ref: '#/definitions/dto.TokenObject'
        type: array
      total:
        example: 2
        type: integer
    type: object
  dto.TokenObject:
    properties:
      expires_at:
        example: "2027-01-01T00:00:00Z"
        type: string
      id:
        example: tok_jkl345
        type: string
      is_master:
        example: false
        type: boolean
      name:
        example: my-app-token
        type: string
      scopes:
        example: read,write
        type: string
    type: object
  dto.TokenUpdateRequest:
    properties:
      expires_at:
        example: "2027-06-01T00:00:00Z"
        type: string
      scopes:
        example: read
        type: string
    type: object
info:
  contact: {}
  description: Cornerstone is a headless data platform providing REST API, Query DSL,
    AI assistant and MCP endpoints.
  title: Cornerstone API
  version: "1.0"
paths:
  /api/v1/ai/chat:
    post:
      consumes:
      - application/json
      description: Send a message to the AI assistant and get a reply.
      parameters:
      - description: Chat request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.AIChatRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.AIChatData'
              type: object
        "400":
          description: Validation error - message is required
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized - invalid or missing API key
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "503":
          description: AI service unavailable - LLM_API_KEY not configured
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Chat with AI assistant
      tags:
      - ai
  /api/v1/databases:
    get:
      description: Returns all databases accessible to the authenticated token.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.DatabaseListData'
              type: object
        "401":
          description: Unauthorized - invalid or missing API key
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: List all databases
      tags:
      - databases
    post:
      consumes:
      - application/json
      description: Create a new database owned by the authenticated token.
      parameters:
      - description: Database to create
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.DatabaseCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.DatabaseObject'
              type: object
        "400":
          description: Validation error - invalid request body
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized - invalid or missing API key
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden - master token required
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Create a database
      tags:
      - databases
  /api/v1/databases/{id}:
    delete:
      description: Delete a database and all of its associated tables, fields, and
        records.
      parameters:
      - description: Database ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.APIResponse'
            - properties:
                data:
                  type: object
              type: object
        "401":
          description: Unauthorized - invalid or missing API key
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden - no access to this database
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Database not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Delete a database
      tags:
      - databases
    get:
      description: Retrieve full details of a single database by its ID.
      parameters:
      - description: Database ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.DatabaseObject'
              type: object
        "401":
          description: Unauthorized - invalid or missing API key
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden - no access to this database
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Database not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get a database by ID
      tags:
      - databases
    put:
      consumes:
      - application/json
      description: Update database name and/or description.
      parameters:
      - description: Database ID
        in: path
        name: id
        required: true
        type: string
      - description: Database update fields
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.DatabaseUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.DatabaseObject'
              type: object
        "400":
          description: Validation error - invalid request body
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized - invalid or missing API key
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden - no access to this database
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Database not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Update a database
      tags:
      - databases
  /api/v1/databases/{id}/tables:
    get:
      description: Returns all tables in the specified database.
      parameters:
      - description: Database ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.TableListData'
              type: object
        "401":
          description: Unauthorized - invalid or missing API key
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden - no access to this database
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: List tables in a database
      tags:
      - tables
  /api/v1/databases/import/template:
    get:
      description: Returns a commented YAML template with all available options for
        the import endpoint.
      produces:
      - application/x-yaml
      responses:
        "200":
          description: YAML template file
          schema:
            type: file
        "401":
          description: Unauthorized - invalid or missing API key
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Download import template
      tags:
      - databases
  /api/v1/databases/import/yaml:
    post:
      consumes:
      - application/x-yaml
      description: Import a database definition from YAML format. Creates the database
        together with nested tables and fields.
      parameters:
      - description: YAML document
        in: body
        name: body
        required: true
        schema:
          type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.BulkCreateData'
              type: object
        "400":
          description: Validation error - invalid YAML or missing fields
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized - invalid or missing API key
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden - master token required
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Import database from YAML
      tags:
      - databases
  /api/v1/databases/with-tables:
    post:
      consumes:
      - application/json
      description: Atomically create a database together with nested tables and fields
        in a single request.
      parameters:
      - description: Database with nested tables and fields
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.DatabaseBulkCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.BulkCreateData'
              type: object
        "400":
          description: Validation error - invalid request body
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized - invalid or missing API key
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden - master token required
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Create a database with tables and fields
      tags:
      - databases
  /api/v1/fields:
    post:
      consumes:
      - application/json
      description: Create a new field in a table.
      parameters:
      - description: Field to create
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.FieldCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.FieldObject'
              type: object
        "400":
          description: Validation error - invalid request body or field type
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized - invalid or missing API key
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden - no access to parent table
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Create a field
      tags:
      - fields
  /api/v1/fields/{id}:
    delete:
      description: Delete a field by ID.
      parameters:
      - description: Field ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.APIResponse'
            - properties:
                data:
                  type: object
              type: object
        "401":
          description: Unauthorized - invalid or missing API key
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden - no access to this field
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Field not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Delete a field
      tags:
      - fields
    get:
      description: Retrieve full details of a single field by its ID.
      parameters:
      - description: Field ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.FieldObject'
              type: object
        "401":
          description: Unauthorized - invalid or missing API key
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden - no access to this field
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Field not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get a field by ID
      tags:
      - fields
    put:
      consumes:
      - application/json
      description: Update field properties including name, type, description, required
        flag, and config.
      parameters:
      - description: Field ID
        in: path
        name: id
        required: true
        type: string
      - description: Field update fields
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.FieldUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.FieldObject'
              type: object
        "400":
          description: Validation error - invalid request body or field type
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized - invalid or missing API key
