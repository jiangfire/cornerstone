version: "2"
run:
  go: "1.26"
  build-tags:
    - sqlite_omit_load_extension
  tests: true
linters:
  default: none
  enable:
    - errcheck
    - gocritic
    - gosec
    - govet
    - ineffassign
    - revive
    - staticcheck
    - unused
  settings:
    errcheck:
      exclude-functions:
        - (*github.com/gin-gonic/gin.Context).Error
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
    gocritic:
      disabled-checks:
        - hugeParam
        - rangeValCopy
        - paramTypeCombine
        - unnamedResult
        - ifElseChain
      enabled-tags:
        - diagnostic
        - performance
        - style
    gosec:
      excludes:
        - G104
        - G304
        - G306
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
          disabled: true
        - name: increment-decrement
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: superfluous-else
        - name: time-naming
        - name: unexported-return
        - name: unreachable-code
        - name: unused-parameter
          disabled: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - gocritic
          - gosec
        path: _test\.go
    paths:
      - backend/bin
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
    paths:
      - backend/bin
      - third_party$
      - builtin$
      - examples$
