# Cornerstone 本地开发 override，叠加在 docker-compose.yml 之上：
#
#     docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# 提供的本地便利：
#   - 把 Postgres 暴露到宿主 5432，便于直接接 psql / DBeaver。
#   - 后端切到 debug，CORS 全放开，便于 CLI / API 客户端调试。
#
# 注意：本文件仅供本地开发使用，不要在公开环境启用。

services:
  postgres:
    ports:
      - "5432:5432"

  app:
    environment:
      SERVER_MODE: debug
      DEBUG: "true"
      CORS_ORIGIN: "*"
      LOG_LEVEL: debug
