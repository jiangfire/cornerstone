definitions:
  swagger.AIChatRequest:
    properties:
      context:
        additionalProperties: {}
        type: object
      message:
        example: Show me all databases
        type: string
    required:
    - message
    type: object
  swagger.AIChatResponse:
    properties:
      context:
        additionalProperties: {}
        type: object
      reply:
        example: 'You have 3 databases: ...'
        type: string
      type:
        example: result
        type: string
    type: object
  swagger.APIResponse:
    properties:
      code:
        example: 0
        type: integer
      data: {}
      message:
        example: success
        type: string
    type: object
  swagger.AggregateFunc:
    properties:
      as:
        example: total
        type: string
      field:
        example: id
        type: string
      func:
        example: count
        type: string
    type: object
  swagger.BatchQueryRequest:
    properties:
      queries:
        additionalProperties:
          $ref: '#/definitions/swagger.QueryDSLRequest'
        type: object
    type: object
  swagger.BulkCreateTable:
    properties:
      description:
        example: User accounts
        type: string
      fields:
        items:
          $ref: '#/definitions/swagger.BulkCreateTableField'
        type: array
      name:
        example: users
        type: string
    required:
    - name
    type: object
  swagger.BulkCreateTableField:
    properties:
      description:
        example: The record title
        type: string
      name:
        example: title
        type: string
      required:
        example: false
        type: boolean
      type:
        example: string
        type: string
    required:
    - name
    - type
    type: object
  swagger.Condition:
    properties:
      and:
        items:
          $ref: '#/definitions/swagger.Condition'
        type: array
      field:
        example: name
        type: string
      not:
        type: boolean
      op:
        example: eq
        type: string
      or:
        items:
          $ref: '#/definitions/swagger.Condition'
        type: array
      value:
        example: Alice
    type: object
  swagger.DatabaseBulkCreateRequest:
    properties:
      description:
        example: App database
        type: string
      name:
        example: My App
        maxLength: 255
        minLength: 2
        type: string
      tables:
        items:
          $ref: '#/definitions/swagger.BulkCreateTable'
        type: array
    required:
    - name
    type: object
  swagger.DatabaseBulkCreateResponse:
    properties:
      database:
        $ref: '#/definitions/swagger.DatabaseObject'
      fields:
        items:
          $ref: '#/definitions/swagger.FieldObject'
        type: array
      summary:
        properties:
          field_count:
            example: 5
            type: integer
          table_count:
            example: 2
            type: integer
        type: object
      tables:
        items:
          $ref: '#/definitions/swagger.TableObject'
        type: array
    type: object
  swagger.DatabaseCreateRequest:
    properties:
      description:
        example: A test database
        maxLength: 500
        type: string
      name:
        example: My Database
        maxLength: 255
        minLength: 2
        type: string
    required:
    - name
    type: object
  swagger.DatabaseListResponse:
    properties:
      databases:
        items:
          $ref: '#/definitions/swagger.DatabaseObject'
        type: array
      total:
        example: 3
        type: integer
    type: object
  swagger.DatabaseObject:
    properties:
      created_at:
        example: "2026-01-01 00:00:00"
        type: string
      description:
        example: A test database
        type: string
      id:
        example: db_abc123
        type: string
      name:
        example: My Database
        type: string
      updated_at:
        example: "2026-01-01 00:00:00"
        type: string
    type: object
  swagger.DatabaseUpdateRequest:
    properties:
      description:
        example: Updated description
        maxLength: 500
        type: string
      name:
        example: Updated DB
        maxLength: 255
        minLength: 2
        type: string
    required:
    - name
    type: object
  swagger.ErrorResponse:
    properties:
      code:
        example: 400
        type: integer
      message:
        example: Validation error - invalid request body
        type: string
    type: object
  swagger.FieldConfig:
    properties:
      allowed_types:
        example:
        - image/*
        - .pdf
        items:
          type: string
        type: array
      format:
        example: "2006-01-02"
        type: string
      max:
        example: 100
        type: number
      max_file_size_mb:
        example: 10
        type: integer
      max_length:
        example: 255
        type: integer
      min:
        example: 0
        type: number
      multiple:
        example: false
        type: boolean
      options:
        example:
        - option1
        - option2
        items:
          type: string
        type: array
      required:
        example: false
        type: boolean
      validation:
        example: ^[a-z]+$
        type: string
    type: object
  swagger.FieldCreateRequest:
    properties:
      config:
        $ref: '#/definitions/swagger.FieldConfig'
      description:
        example: Current status
        maxLength: 1000
        type: string
      name:
        example: status
        maxLength: 255
        minLength: 1
        type: string
      options:
        example: active,inactive
        type: string
      required:
        example: true
        type: boolean
      table_id:
        example: tbl_xyz789
        type: string
      type:
        example: select
        type: string
    required:
    - name
    - table_id
    - type
    type: object
  swagger.FieldListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/swagger.FieldObject'
        type: array
      total:
        example: 8
        type: integer
    type: object
  swagger.FieldObject:
    properties:
      config:
        $ref: '#/definitions/swagger.FieldConfig'
      created_at:
        example: "2026-01-01 00:00:00"
        type: string
      description:
        example: Current status
        type: string
      id:
        example: fld_def456
        type: string
      name:
        example: status
        type: string
      options:
        example: active,inactive
        type: string
      required:
        example: true
        type: boolean
      table_id:
        example: tbl_xyz789
        type: string
      type:
        example: select
        type: string
      updated_at:
        example: "2026-01-01 00:00:00"
        type: string
    type: object
  swagger.FieldUpdateRequest:
    properties:
      config:
        $ref: '#/definitions/swagger.FieldConfig'
      description:
        example: Current status
        maxLength: 1000
        type: string
      name:
        example: status
        maxLength: 255
        minLength: 1
        type: string
      options:
        example: active,inactive
        type: string
      required:
        example: true
        type: boolean
      type:
        example: select
        type: string
    required:
    - name
    - type
    type: object
  swagger.FileListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/swagger.FileObject'
        type: array
    type: object
  swagger.FileObject:
    properties:
      created_at:
        example: "2026-01-01 00:00:00"
        type: string
      field_id:
        example: fld_def456
        type: string
      file_name:
        example: report.pdf
        type: string
      file_size:
        example: 204800
        type: integer
      file_type:
        example: application/pdf
        type: string
      id:
        example: fil_mno678
        type: string
      record_id:
        example: rec_ghi012
        type: string
      storage_url:
        example: ./uploads/file_report.pdf
        type: string
      updated_at:
        example: "2026-01-01 00:00:00"
        type: string
    type: object
  swagger.JoinClause:
    properties:
      as:
        example: f
        type: string
      "on":
        $ref: '#/definitions/swagger.JoinCondition'
      select:
        example:
        - name
        - type
        items:
          type: string
        type: array
      table:
        example: fields
        type: string
      type:
        example: left
        type: string
    type: object
  swagger.JoinCondition:
    properties:
      left:
        example: tables.id
        type: string
      op:
        example: =
        type: string
      right:
        example: f.table_id
        type: string
    type: object
  swagger.OrderByClause:
    properties:
      dir:
        example: desc
        type: string
      field:
        example: created_at
        type: string
    type: object
  swagger.QueryDSLRequest:
    properties:
      aggregate:
        items:
          $ref: '#/definitions/swagger.AggregateFunc'
        type: array
      filter:
        additionalProperties: {}
        type: object
      from:
        example: records
        type: string
      groupBy:
        example:
        - table_id
        items:
          type: string
        type: array
      having:
        $ref: '#/definitions/swagger.WhereClause'
      join:
        items:
          $ref: '#/definitions/swagger.JoinClause'
        type: array
      orderBy:
        items:
          $ref: '#/definitions/swagger.OrderByClause'
        type: array
      page:
        example: 1
        type: integer
      select:
        example:
        - id
        - name
        - data
        items:
          type: string
        type: array
      size:
        example: 20
        type: integer
      sort:
        example: -created_at
        type: string
      table:
        example: records
        type: string
      union:
        items:
          $ref: '#/definitions/swagger.QueryDSLRequest'
        type: array
      where:
        $ref: '#/definitions/swagger.WhereClause'
    type: object
  swagger.QueryResult:
    properties:
      data:
        items:
          additionalProperties: true
          type: object
        type: array
      has_more:
        example: true
        type: boolean
      page:
        example: 1
        type: integer
      size:
        example: 20
        type: integer
      total:
        example: 100
        type: integer
    type: object
  swagger.RecordBatchCreateRequest:
    properties:
      data:
        additionalProperties: true
        type: object
      table_id:
        example: tbl_xyz789
        type: string
    required:
    - data
    - table_id
    type: object
  swagger.RecordCreateRequest:
    properties:
      data:
        additionalProperties: true
        type: object
      table_id:
        example: tbl_xyz789
        type: string
    required:
    - data
    - table_id
    type: object
  swagger.RecordListResponse:
    properties:
      has_more:
        example: true
        type: boolean
      items:
        items:
          $ref: '#/definitions/swagger.RecordObject'
        type: array
      total:
        example: 42
        type: integer
    type: object
  swagger.RecordObject:
    properties:
      created_at:
        example: "2026-01-01 00:00:00"
        type: string
      data:
        additionalProperties: true
        type: object
      id:
        example: rec_ghi012
        type: string
      table_id:
        example: tbl_xyz789
        type: string
      updated_at:
        example: "2026-01-01 00:00:00"
        type: string
      version:
        example: 1
        type: integer
    type: object
  swagger.RecordUpdateRequest:
    properties:
      data:
        additionalProperties: true
        type: object
      version:
        example: 3
        type: integer
    required:
    - data
    type: object
  swagger.TableCreateRequest:
    properties:
      database_id:
        example: db_abc123
        type: string
      description:
        example: Order records
        maxLength: 500
        type: string
      name:
        example: orders
        maxLength: 255
        minLength: 2
        type: string
    required:
    - database_id
    - name
    type: object
  swagger.TableListResponse:
    properties:
      tables:
        items:
          $ref: '#/definitions/swagger.TableObject'
        type: array
      total:
        example: 5
        type: integer
    type: object
  swagger.TableObject:
    properties:
      created_at:
        example: "2026-01-01 00:00:00"
        type: string
      database_id:
        example: db_abc123
        type: string
      description:
        example: Order records
        type: string
      id:
        example: tbl_xyz789
        type: string
      name:
        example: orders
        type: string
      updated_at:
        example: "2026-01-01 00:00:00"
        type: string
    type: object
  swagger.TableUpdateRequest:
    properties:
      description:
        example: Updated orders
        maxLength: 500
        type: string
      name:
        example: orders_v2
        maxLength: 255
        minLength: 2
        type: string
    required:
    - name
    type: object
  swagger.TokenCreateRequest:
    properties:
      expires_at:
        example: "2027-01-01T00:00:00Z"
        type: string
      name:
        example: my-app-token
        maxLength: 255
        minLength: 1
        type: string
      scopes:
        example: read,write
        type: string
    required:
    - name
    type: object
  swagger.TokenCreateResponse:
    properties:
      created_at:
        example: "2026-01-01T00:00:00Z"
        type: string
      expires_at:
        example: "2027-01-01T00:00:00Z"
        type: string
      id:
        example: tok_jkl345
        type: string
      name:
        example: my-app-token
        type: string
      scopes:
        example: read,write
        type: string
      token:
        example: cs_a1b2c3d4e5f6...
        type: string
    type: object
  swagger.TokenListResponse:
    properties:
      tokens:
        items:
          $ref: '#/definitions/swagger.TokenObject'
        type: array
      total:
        example: 2
        type: integer
    type: object
  swagger.TokenObject:
    properties:
      created_at:
        example: "2026-01-01T00:00:00Z"
        type: string
      expires_at:
        example: "2027-01-01T00:00:00Z"
        type: string
      id:
        example: tok_jkl345
        type: string
      is_master:
        example: false
        type: boolean
      name:
        example: my-app-token
        type: string
      scopes:
        example: read,write
        type: string
    type: object
  swagger.TokenUpdateRequest:
    properties:
      expires_at:
        example: "2027-06-01T00:00:00Z"
        type: string
      scopes:
        example: read
        type: string
    type: object
  swagger.WhereClause:
    properties:
      and:
        items:
          $ref: '#/definitions/swagger.Condition'
        type: array
      or:
        items:
          $ref: '#/definitions/swagger.Condition'
        type: array
    type: object
info:
  contact: {}
  description: Cornerstone is a headless data platform providing REST API, Query DSL,
    AI assistant and MCP endpoints.
  title: Cornerstone API
  version: "1.0"
paths:
  /api/ai/chat:
    post:
      consumes:
      - application/json
      description: Send a message to the AI assistant and get a reply.
      parameters:
      - description: Chat request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/swagger.AIChatRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/swagger.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/swagger.AIChatResponse'
              type: object
        "400":
          description: Validation error - message is required
          schema:
            $ref: '#/definitions/swagger.ErrorResponse'
        "401":
          description: Unauthorized - invalid or missing API key
          schema:
            $ref: '#/definitions/swagger.ErrorResponse'
        "503":
          description: AI service unavailable - LLM_API_KEY not configured
          schema:
            $ref: '#/definitions/swagger.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Chat with AI assistant
      tags:
      - ai
  /api/databases:
    get:
      description: Returns all databases accessible to the authenticated token.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/swagger.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/swagger.DatabaseListResponse'
              type: object
        "401":
          description: Unauthorized - invalid or missing API key
          schema:
            $ref: '#/definitions/swagger.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/swagger.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: List all databases
      tags:
      - databases
    post:
      consumes:
      - application/json
      description: Create a new database owned by the authenticated token.
      parameters:
      - description: Database to create
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/swagger.DatabaseCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/swagger.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/swagger.DatabaseObject'
              type: object
        "400":
          description: Validation error - invalid request body
          schema:
            $ref: '#/definitions/swagger.ErrorResponse'
        "401":
          description: Unauthorized - invalid or missing API key
          schema:
            $ref: '#/definitions/swagger.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Create a database
      tags:
      - databases
  /api/databases/{id}:
    delete:
      description: Delete a database and all of its associated tables, fields, and
        records.
      parameters:
      - description: Database ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/swagger.APIResponse'
            - properties:
                data:
                  type: object
              type: object
        "401":
          description: Unauthorized - invalid or missing API key
          schema:
            $ref: '#/definitions/swagger.ErrorResponse'
        "403":
          description: Forbidden - no access to this database
          schema:
            $ref: '#/definitions/swagger.ErrorResponse'
        "404":
          description: Database not found
          schema:
            $ref: '#/definitions/swagger.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Delete a database
      tags:
      - databases
    get:
      description: Retrieve full details of a single database by its ID.
      parameters:
      - description: Database ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/swagger.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/swagger.DatabaseObject'
              type: object
        "401":
          description: Unauthorized - invalid or missing API key
          schema:
            $ref: '#/definitions/swagger.ErrorResponse'
        "403":
          description: Forbidden - no access to this database
          schema:
            $ref: '#/definitions/swagger.ErrorResponse'
        "404":
          description: Database not found
          schema:
            $ref: '#/definitions/swagger.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get a database by ID
      tags:
      - databases
    put:
      consumes:
      - application/json
      description: Update database name and/or description.
      parameters:
      - description: Database ID
        in: path
        name: id
        required: true
        type: string
      - description: Database update fields
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/swagger.DatabaseUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/swagger.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/swagger.DatabaseObject'
              type: object
        "400":
          description: Validation error - invalid request body
          schema:
            $ref: '#/definitions/swagger.ErrorResponse'
        "401":
          description: Unauthorized - invalid or missing API key
          schema:
            $ref: '#/definitions/swagger.ErrorResponse'
        "403":
          description: Forbidden - no access to this database
          schema:
            $ref: '#/definitions/swagger.ErrorResponse'
        "404":
          description: Database not found
          schema:
            $ref: '#/definitions/swagger.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Update a database
      tags:
      - databases
  /api/databases/{id}/tables:
    get:
      description: Returns all tables in the specified database.
      parameters:
      - description: Database ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/swagger.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/swagger.TableListResponse'
              type: object
        "401":
          description: Unauthorized - invalid or missing API key
          schema:
            $ref: '#/definitions/swagger.ErrorResponse'
        "403":
          description: Forbidden - no access to this database
          schema:
            $ref: '#/definitions/swagger.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: List tables in a database
      tags:
      - tables
  /api/databases/with-tables:
    post:
      consumes:
      - application/json
      description: Atomically create a database together with nested tables and fields
        in a single request.
      parameters:
      - description: Database with nested tables and fields
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/swagger.DatabaseBulkCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/swagger.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/swagger.DatabaseBulkCreateResponse'
              type: object
        "400":
          description: Validation error - invalid request body
          schema:
            $ref: '#/definitions/swagger.ErrorResponse'
        "401":
          description: Unauthorized - invalid or missing API key
          schema:
            $ref: '#/definitions/swagger.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Create a database with tables and fields
      tags:
      - databases
  /api/fields:
    post:
      consumes:
      - application/json
      description: Create a new field in a table.
      parameters:
      - description: Field to create
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/swagger.FieldCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/swagger.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/swagger.FieldObject'
              type: object
        "400":
          description: Validation error - invalid request body or field type
          schema:
            $ref: '#/definitions/swagger.ErrorResponse'
        "401":
          description: Unauthorized - invalid or missing API key
          schema:
            $ref: '#/definitions/swagger.ErrorResponse'
        "403":
          description: Forbidden - no access to parent table
          schema:
            $ref: '#/definitions/swagger.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Create a field
      tags:
      - fields
  /api/fields/{id}:
    delete:
      description: Delete a field by ID.
      parameters:
      - description: Field ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/swagger.APIResponse'
            - properties:
                data:
                  type: object
              type: object
        "401":
          description: Unauthorized - invalid or missing API key
          schema:
            $ref: '#/definitions/swagger.ErrorResponse'
        "403":
