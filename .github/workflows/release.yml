name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  build:
    name: Build Cross-Platform Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'
          cache-dependency-path: go.sum

      - name: Build binary
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build -ldflags="-s -w -X github.com/jiangfire/cornerstone/internal/cli.Version=${{ github.ref_name }}" -trimpath -tags=sqlite_omit_load_extension -o cornerstone-${{ matrix.suffix }} ./cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: cornerstone-${{ matrix.suffix }}
          path: cornerstone-${{ matrix.suffix }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -type f -exec mv {} release/ \;
          cd release
          for file in *; do
            if [[ "$file" == *.exe ]]; then
              zip "${file%.exe}.zip" "$file"
            else
              tar czf "$file.tar.gz" "$file"
            fi
          done

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          path: ./release
          format: spdx-json
          output-file: release/cornerstone-${{ github.ref_name }}.spdx.json
          upload-artifact: false

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Sign release blobs (keyless)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cd release
          for file in *.tar.gz *.zip *.spdx.json; do
            [ -f "$file" ] || continue
            cosign sign-blob --yes \
              --bundle "${file}.cosign.bundle" \
              "$file"
          done

      - name: Generate checksums
        run: |
          cd release
          sha256sum *.tar.gz *.zip *.spdx.json > SHA256SUMS
          cosign sign-blob --yes --bundle SHA256SUMS.cosign.bundle SHA256SUMS

      - name: Generate changelog
        id: changelog
        run: |
          cat > RELEASE_NOTES.md << EOF
          ## What's Changed

          This release includes:
          - Cross-platform binaries for Linux (amd64, arm64), Windows (amd64), and macOS (amd64, arm64)
          - All latest features and bug fixes

          ## Installation

          Download the appropriate binary for your platform:
          - **Linux AMD64**: cornerstone-linux-amd64.tar.gz
          - **Linux ARM64**: cornerstone-linux-arm64.tar.gz
          - **Windows AMD64**: cornerstone-windows-amd64.zip
          - **macOS AMD64**: cornerstone-darwin-amd64.tar.gz
          - **macOS ARM64 (Apple Silicon)**: cornerstone-darwin-arm64.tar.gz

          ## Verification

          每个 artifact 附带 \`*.cosign.bundle\`,用 cosign keyless 验证:

          \`\`\`bash
          cosign verify-blob \\
            --bundle cornerstone-linux-amd64.tar.gz.cosign.bundle \\
            --certificate-identity-regexp 'https://github.com/${{ github.repository }}/' \\
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \\
            cornerstone-linux-amd64.tar.gz
          \`\`\`

          SBOM (SPDX JSON): \`cornerstone-${{ github.ref_name }}.spdx.json\`,描述本次发布所含组件。

          ## Usage

          1. Extract the archive
          2. Set up your \`.env\` file (see .env.example)
          3. Run the binary: \`./cornerstone-*\`

          ## Docker

          Docker image is available at:
          - \`ghcr.io/${{ github.repository }}:${{ github.ref_name }}\`

          镜像同样由 cosign 签名,验证方式见仓库 README。

          **Full Changelog**: https://github.com/${{ github.repository }}/compare/...
          EOF

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          prerelease_flag=""
          if [[ "${{ github.ref_name }}" == *beta* || "${{ github.ref_name }}" == *alpha* ]]; then
            prerelease_flag="--prerelease"
          fi
          gh release create "${{ github.ref_name }}" \
            release/*.tar.gz \
            release/*.zip \
            release/*.spdx.json \
            release/*.cosign.bundle \
            release/SHA256SUMS \
            --title "${{ github.ref_name }}" \
            --notes-file RELEASE_NOTES.md \
            --verify-tag \
            ${prerelease_flag}
