name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

jobs:
  test-sqlite:
    name: Tests (SQLite)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: false

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Generate coverage report
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage
        uses: actions/upload-artifact@v6
        with:
          name: coverage
          path: coverage.html

  test-mysql:
    name: Tests (MySQL 8.0)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: cornerstone_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DB_TYPE: mysql
      DATABASE_URL: root:root@tcp(127.0.0.1:3306)/cornerstone_test?parseTime=true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: false

      - name: Download dependencies
        run: go mod download

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            (echo > /dev/tcp/127.0.0.1/3306) >/dev/null 2>&1 && break
            sleep 2
          done

      - name: Run tests
        run: go test -v -race -p 1 -timeout 15m ./...

  test-postgres:
    name: Tests (PostgreSQL 16)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cornerstone_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d cornerstone_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DB_TYPE: postgres
      DATABASE_URL: host=127.0.0.1 port=5432 user=postgres password=postgres dbname=cornerstone_test sslmode=disable

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: false

      - name: Download dependencies
        run: go mod download

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            (echo > /dev/tcp/127.0.0.1/5432) >/dev/null 2>&1 && break
            sleep 2
          done

      - name: Run tests
        run: go test -v -race -p 1 -timeout 15m ./...

  test-redis:
    name: Tests (Redis Cache)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      REDIS_URL: redis://127.0.0.1:6379/0

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: false

      - name: Download dependencies
        run: go mod download

      - name: Wait for Redis
        run: |
          for i in {1..30}; do
            (echo > /dev/tcp/127.0.0.1/6379) >/dev/null 2>&1 && break
            sleep 2
          done

      - name: Run tests with Redis cache backend
        run: go test -v -race -p 1 -timeout 15m ./...

  migration-integration:
    name: Migration Integration
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: cornerstone_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cornerstone_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d cornerstone_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      MYSQL_TEST_DSN: root:root@tcp(127.0.0.1:3306)/cornerstone_test?parseTime=true
      POSTGRES_TEST_DSN: host=127.0.0.1 port=5432 user=postgres password=postgres dbname=cornerstone_test sslmode=disable

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: false

      - name: Download dependencies
        run: go mod download

      - name: Wait for database services
        run: |
          for i in {1..30}; do
            (echo > /dev/tcp/127.0.0.1/3306) >/dev/null 2>&1 && break
            sleep 2
          done
          for i in {1..30}; do
            (echo > /dev/tcp/127.0.0.1/5432) >/dev/null 2>&1 && break
            sleep 2
          done

      - name: Run migration integration tests
        run: go test -v -count=1 ./internal/migration/...

  lint:
    name: Lint (golangci-lint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: false

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.1
          args: --config=.golangci.yml --timeout=5m
          skip-cache: true
          skip-save-cache: true

  vuln:
    name: Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: false

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  fs-vuln:
    name: Filesystem Vulnerability Scan (trivy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          cache: 'false'
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          format: table
          skip-dirs: '.git,docs,bin'

  build-verify:
    name: Build Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: false

      - name: Verify build compiles
        run: |
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -X github.com/jiangfire/cornerstone/internal/cli.Version=ci" -o /dev/null ./cmd

  server-startup-test:
    name: Server Startup Test
    runs-on: ubuntu-latest
    needs: build-verify

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: false

      - name: Build binary
        run: |
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -X github.com/jiangfire/cornerstone/internal/cli.Version=ci-test" -o cornerstone ./cmd

      - name: Start server in background
        run: |
          PORT=18080 ./cornerstone serve &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV
          echo "Server started with PID $SERVER_PID"

      - name: Wait for server to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:18080/health > /dev/null 2>&1; then
              echo "Server is ready"
              exit 0
            fi
            echo "Waiting for server... ($i/30)"
            sleep 1
          done
          echo "Server failed to start within 30 seconds"
          exit 1

      - name: Test health endpoint
        run: |
          RESPONSE=$(curl -s http://localhost:18080/health)
          echo "Health response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"status":"healthy"' || (echo "Health check failed" && exit 1)

      - name: Test API endpoint (should return 401 without auth)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:18080/api/v1/databases)
          echo "API status code: $STATUS"
          if [ "$STATUS" != "401" ]; then
            echo "Expected 401, got $STATUS"
            exit 1
          fi

      - name: Test legacy API redirect
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:18080/api/databases)
          echo "Legacy API status code: $STATUS"
          if [ "$STATUS" != "401" ]; then
            echo "Expected 401, got $STATUS"
            exit 1
          fi

      - name: Stop server
        if: always()
        run: |
          if [ -n "$SERVER_PID" ]; then
            kill $SERVER_PID 2>/dev/null || true
            wait $SERVER_PID 2>/dev/null || true
            echo "Server stopped"
          fi
