name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# 默认最小权限；需要写权限的 step 在 job 层显式提权。
permissions:
  contents: read

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.4'
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Generate coverage report
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage
        uses: actions/upload-artifact@v6
        with:
          name: backend-coverage
          path: backend/coverage.html

  backend-lint:
    name: Backend Lint (golangci-lint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.4'
          cache-dependency-path: backend/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.2
          working-directory: ./backend
          args: --config=../.golangci.yml --timeout=5m

  backend-vuln:
    name: Backend Vulnerability Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.4'
          cache-dependency-path: backend/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  fs-vuln:
    name: Filesystem Vulnerability Scan (trivy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          format: table
          # 与 .dockerignore 同步; 这些不参与运行时, 跳过减少噪音
          skip-dirs: '.git,docs,node_modules,frontend/node_modules,frontend/dist,backend/internal/frontend/dist,backend/bin,backend/logs'

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          package-manager-cache: false

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.28.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type check
        run: pnpm run type-check

      - name: Build frontend
        run: pnpm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: frontend-dist
          path: frontend/dist

  frontend-lint:
    name: Frontend Lint (eslint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          package-manager-cache: false

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.28.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run eslint
        # 直接调 eslint 而不走 package.json 的 lint script,因为后者带 --fix,
        # CI 不允许修改文件。--max-warnings=0 把 warning 升格为 error。
        run: pnpm exec eslint . --max-warnings=0

  frontend-test:
    name: Frontend Tests (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          package-manager-cache: false

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.28.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run vitest
        run: pnpm run test:unit --run --reporter=default

  embedded-build:
    name: Embedded Build Verification
    needs: [frontend-build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download frontend dist
        uses: actions/download-artifact@v5
        with:
          name: frontend-dist
          path: backend/internal/frontend/dist

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.4'
          cache-dependency-path: backend/go.sum

      - name: Verify embedded build compiles
        run: |
          cd backend
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -X main.Version=ci" -o /dev/null ./cmd/server
